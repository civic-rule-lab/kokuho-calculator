    .wrap{
      max-width:760px;
      margin:40px auto;
      padding:0 20px 60px;
    }

    h1{
      text-align:center;
      line-height:1.4;
      margin:10px 0 14px;
      font-size:34px;
    }

    .lead{
      max-width:620px;
      margin:0 auto 28px;
      text-align:center;
      line-height:1.9;
      color:#555;
    }

    .card{
      background:#fff;
      border-radius:12px;
      box-shadow:0 4px 14px rgba(0,0,0,0.08);
      padding:24px 20px;
      max-width:680px;
      margin:0 auto 24px;
    }

    .card h2{
      margin:0 0 14px;
      font-size:22px;
    }

    .searchBox{
      width:100%;
      box-sizing:border-box;
      padding:14px;
      border:1px solid #d8dee8;
      border-radius:8px;
      font-size:16px;
    }

    .city-list{
      list-style:none;
      padding:0;
      margin:18px 0 0;
    }

    .city-list li{
      border-top:1px solid #eceff5;
      padding:16px 0;
    }

    .city-list li:first-child{
      border-top:none;
      padding-top:0;
    }

    .city-link{
      display:block;
      text-decoration:none;
      color:inherit;
    }

    .city-name{
      color:#2563eb;
      font-weight:700;
      font-size:18px;
    }

    .city-name.plain{
      color:#222;
    }

    .city-meta{
      margin-top:6px;
      color:#666;
      font-size:14px;
    }

    .section-title{
      max-width:680px;
      margin:40px auto 12px;
      text-align:center;
      font-size:22px;
    }

    .section-text{
      max-width:620px;
      margin:0 auto 28px;
      line-height:1.9;
      color:#333;
    }

    @media (max-width:640px){
      .wrap{
        margin:24px auto;
        padding:0 14px 40px;
      }

      h1{
        font-size:28px;
      }
    }
  </style>

<body>
  <div class="wrap">

    <h1>全国の国保計算ツール一覧</h1>

    <p class="lead">
      自治体ごとの国民健康保険料の目安を確認できる計算ツール一覧です。
    </p>

    <div class="card">
      <h2>自治体を探す</h2>

      <input
        id="searchBox"
        class="searchBox"
        type="text"
        placeholder="自治体名を入力（例：茅ヶ崎市）"
      >

      <ul id="cityList" class="city-list"></ul>
    </div>

    <h2 class="section-title">このページについて</h2>
    <div class="section-text">
      Civic Rule Lab は、自治体ごとの制度を確認しやすくするためのルールベース計算ツールです。
    </div>

  </div>

  <script src="./search.js"></script>
