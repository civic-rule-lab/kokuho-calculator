<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>全国の国保計算ツール一覧</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
margin:0;
padding:20px;
color:#222;
}

.wrap{
max-width:760px;
margin:auto;
}

h1{
font-size:32px;
text-align:center;
margin-bottom:10px;
}

.lead{
text-align:center;
color:#555;
margin-bottom:40px;
}

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:14px;
font-size:16px;
border-radius:8px;
border:1px solid #ddd;
}

.city-list{
list-style:none;
padding:0;
margin:0;
}

.city-list li{
padding:18px 0;
border-top:1px solid #eee;
cursor:pointer;
}

.city-name{
font-size:18px;
font-weight:600;
color:#2563eb;
}

.city-meta{
font-size:14px;
color:#666;
margin-top:4px;
}

.plain{
color:#222;
}

</style>
</head>

<body>

<div class="wrap">

<h1>全国の国保計算ツール一覧</h1>

<p class="lead">
自治体ごとの国民健康保険料の目安を確認できる計算ツール一覧です。
</p>

<div class="search-box">
<input id="searchBox" placeholder="自治体名を入力（例：茅ヶ崎市）">
</div>

<ul id="cityList" class="city-list"></ul>

<h2>このページについて</h2>

<p>
Civic Rule Lab は、自治体ごとの制度を確認しやすくするためのルールベース計算ツールです。
</p>

</div>

<script>

const municipalities = [

{
cityName:"茅ヶ崎市",
prefecture:"神奈川県",
file:"chigasaki-kokuho.html",
status:"active"
},

{
cityName:"藤沢市",
prefecture:"神奈川県",
file:"",
status:"planned"
},

{
cityName:"平塚市",
prefecture:"神奈川県",
file:"",
status:"planned"
},

{
cityName:"大田区",
prefecture:"東京都",
file:"",
status:"planned"
}

];

const searchBox=document.getElementById("searchBox");
const cityList=document.getElementById("cityList");

function renderList(keyword=""){

const q=keyword.trim().toLowerCase();

cityList.innerHTML="";

municipalities
.filter(city=>{
const text=(city.cityName+city.prefecture).toLowerCase();
return text.includes(q);
})
.forEach(city=>{

const li=document.createElement("li");

if(city.status==="active"){

li.innerHTML=`
<div class="city-name">${city.cityName}</div>
<div class="city-meta">${city.prefecture}｜国民健康保険料計算ツール</div>
`;

li.addEventListener("click",()=>{
window.location.href=city.file;
});

}else{

li.innerHTML=`
<div class="city-name plain">${city.cityName}</div>
<div class="city-meta">${city.prefecture}｜準備中</div>
`;

}

cityList.appendChild(li);

});

}

searchBox.addEventListener("input",()=>{
renderList(searchBox.value);
});

renderList();

</script>

</body>
</html>
